services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=false" # Secure dashboard
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Auto-redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt SSL Resolver (Prod only)
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@techaxon.de"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - techaxon-net

  nextjs:
    build: 
      context: .
      # In prod, we use the standard Dockerfile (which runs npm run build)
      dockerfile: Dockerfile 
    environment:
      - COUCHDB_URL=${COUCHDB_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - COOKIE_DOMAIN=.techaxon.de # Real domain for production SSO
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-prod.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.techaxon.de`) || Host(`techaxon.de`)"
      - "traefik.http.routers.nextjs-prod.entrypoints=websecure"
      - "traefik.http.routers.nextjs-prod.tls.certresolver=myresolver"
    networks:
      - techaxon-net
    depends_on:
      - couchdb
      - redis

  couchdb:
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    # No ports exposed in production, strictly internal network!
    volumes:
      - couchdb-data:/opt/couchdb/data
    networks:
      - techaxon-net

  redis:
    image: redis:7-alpine
    # No ports exposed in production, strictly internal!
    volumes:
      - redis-data:/data
    networks:
      - techaxon-net

volumes:
  couchdb-data:
  redis-data:
  traefik-certs:

networks:
  techaxon-net:
    driver: bridge