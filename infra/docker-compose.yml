services:
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - traefik-public


  couchdb:
    image: apache/couchdb:3.5.2
    container_name: couchdb
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: admin123

    volumes:
      - couchdb_data:/opt/couchdb/data

    networks:
      - traefik-public


  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]

    volumes:
      - redis_data:/data

    networks:
      - traefik-public


volumes:
  couchdb_data:
  redis_data:

networks:
  traefik-public:
    external: true