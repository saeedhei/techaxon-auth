services:
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true" # Dashboard open for Dev
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - techaxon-net

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - COUCHDB_URL=${COUCHDB_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - COOKIE_DOMAIN=.techaxon.localhost
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-dev.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.techaxon.localhost`) || Host(`techaxon.localhost`)"
      - "traefik.http.routers.nextjs-dev.entrypoints=web"
    networks:
      - techaxon-net
    depends_on:
      - couchdb
      - redis

  couchdb:
    image: apache/couchdb:3.5.2
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "5984:5984" # Exposed for local debugging
    volumes:
      - couchdb-data:/opt/couchdb/data
    networks:
      - techaxon-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - techaxon-net

volumes:
  couchdb-data:
  redis-data:

networks:
  techaxon-net:
    driver: bridge


